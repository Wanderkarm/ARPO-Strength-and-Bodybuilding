name: iOS Build & TestFlight

# Run manually from GitHub Actions tab, or automatically on pushes to main
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: App

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1b. Select Xcode 26 (iOS 26 SDK required by App Store Connect) ──────
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26"

      # ── 2. Node / JS deps ────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: App/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      # ── 3. Generate native iOS project ───────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          CI: "1"

      # ── 4. Ruby / CocoaPods ──────────────────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: App/ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: App/ios/Pods
          key: pods-${{ hashFiles('App/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        working-directory: App/ios
        run: pod install --repo-update

      # ── 5. Code signing ──────────────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_DIST_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
        run: |
          # Install full Apple certificate chain: Root CA G3 + WWDR G3 intermediate
          # Without the root CA trusted, codesign fails with errSecInternalComponent
          curl -s -o /tmp/AppleRootCAG3.cer https://www.apple.com/certificateauthority/AppleRootCA-G3.cer
          curl -s -o /tmp/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          sudo security import /tmp/AppleRootCAG3.cer -k /Library/Keychains/System.keychain -t cert || true
          sudo security import /tmp/AppleWWDRCAG3.cer -k /Library/Keychains/System.keychain -t cert || true

          # Use full path — avoids .keychain vs .keychain-db naming issues on modern macOS
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security create-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH

          # Import the full p12 (cert + private key) — no -t flag so the private key is included
          echo "$CERTIFICATE_P12" | base64 --decode -o /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k $KEYCHAIN_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A
          # Grant non-interactive access to the private key (no || true — we want to see failures)
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "ci_keychain_pass" $KEYCHAIN_PATH
          rm /tmp/certificate.p12

          # Set as default and add to search list
          security default-keychain -s $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/powrlog_appstore.mobileprovision
          # Extract UUID for use in xcodebuild
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< $(security cms -D -i ~/Library/MobileDevice/Provisioning\ Profiles/powrlog_appstore.mobileprovision))
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      # ── 5b. Verify code signing setup ────────────────────────────────────────
      - name: Check signing identities
        run: |
          echo "=== Keychain search list ==="
          security list-keychains
          echo "=== Valid signing identities ==="
          security find-identity -v -p codesigning || echo "none found"
          echo "=== Profile UUID ==="
          echo "$PROFILE_UUID"

      # ── 6. Xcode archive ─────────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace ios/POWRLOG.xcworkspace \
            -scheme POWRLOG \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/POWRLOG.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="Q2MSA33256" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            2>&1 | tee /tmp/xcodebuild.log || true
          echo "===== BUILD RESULT ====="
          grep -E "ARCHIVE (FAILED|SUCCEEDED)|BUILD (FAILED|SUCCEEDED)" /tmp/xcodebuild.log || echo "No final result line found"
          echo "===== EMBED PODS FRAMEWORKS SCRIPT OUTPUT ====="
          grep -A 60 "Embed Pods Frameworks" /tmp/xcodebuild.log | head -65 || echo "PhaseScriptExecution line not found"
          echo "===== ALL LINES WITH error (case insensitive, no notes/warnings) ====="
          grep -i "error" /tmp/xcodebuild.log | grep -v "^note:" | grep -v "warning:" || echo "No error lines found"
          # Exit 1 if build failed
          grep -q "ARCHIVE FAILED\|BUILD FAILED" /tmp/xcodebuild.log && exit 1 || true

      # ── 7. Export IPA ────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.powrlog.app</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/POWRLOG.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      # ── 8. Upload to TestFlight ───────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/POWRLOG.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # ── 9. Distribute to internal test groups ────────────────────────────────
      - name: Distribute to Beta 1 and Test1 groups
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          APP_BUNDLE_ID: "com.powrlog.app"
        run: |
          gem install jwt --quiet 2>/dev/null
          ruby - <<'RUBY'
          require 'jwt'
          require 'base64'
          require 'net/http'
          require 'json'
          require 'uri'

          # ── Build JWT ──────────────────────────────────────────────────────
          key_id      = ENV['ASC_KEY_ID']
          issuer_id   = ENV['ASC_ISSUER_ID']
          private_key = OpenSSL::PKey::EC.new(Base64.decode64(ENV['ASC_PRIVATE_KEY']))
          token = JWT.encode(
            { iss: issuer_id, iat: Time.now.to_i, exp: Time.now.to_i + 1200, aud: 'appstoreconnect-v1' },
            private_key, 'ES256', { kid: key_id }
          )
          headers = { 'Authorization' => "Bearer #{token}", 'Content-Type' => 'application/json' }

          def asc_get(path, headers)
            uri = URI("https://api.appstoreconnect.apple.com#{path}")
            req = Net::HTTP::Get.new(uri, headers)
            Net::HTTP.start(uri.host, uri.port, use_ssl: true) { |h| JSON.parse(h.request(req).body) }
          end

          def asc_post(path, body, headers)
            uri = URI("https://api.appstoreconnect.apple.com#{path}")
            req = Net::HTTP::Post.new(uri, headers)
            req.body = body.to_json
            Net::HTTP.start(uri.host, uri.port, use_ssl: true) { |h| h.request(req) }
          end

          # ── Find the app ──────────────────────────────────────────────────
          apps = asc_get('/v1/apps?filter[bundleId]=com.powrlog.app', headers)
          app_id = apps['data']&.first&.dig('id')
          abort "Could not find app" unless app_id
          puts "App ID: #{app_id}"

          # ── Poll for the latest processed build (up to 15 min) ────────────
          build_id = nil
          30.times do |i|
            resp = asc_get("/v1/builds?filter[app]=#{app_id}&filter[processingState]=VALID&sort=-uploadedDate&limit=1", headers)
            build_id = resp['data']&.first&.dig('id')
            if build_id
              puts "Build ready: #{build_id}"
              break
            end
            puts "Attempt #{i+1}/30 — not ready yet, waiting 30s..."
            sleep 30
          end
          abort "Build never became ready — skipping group distribution" unless build_id

          # ── Find Beta 1 and Test1 group IDs ──────────────────────────────
          groups = asc_get("/v1/apps/#{app_id}/betaGroups", headers)
          target_names = ['Beta 1', 'Test1']
          target_groups = groups['data']&.select { |g| target_names.include?(g.dig('attributes', 'name')) } || []
          puts "Found groups: #{target_groups.map { |g| g.dig('attributes', 'name') }.join(', ')}"

          # ── Add build to each group ────────────────────────────────────────
          target_groups.each do |group|
            group_id   = group['id']
            group_name = group.dig('attributes', 'name')
            body = { data: [{ type: 'builds', id: build_id }] }
            res = asc_post("/v1/betaGroups/#{group_id}/relationships/builds", body, headers)
            puts "#{group_name}: HTTP #{res.code}"
          end
          puts "Distribution complete"
          RUBY

      # ── 10. Cleanup keychain ──────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/build.keychain-db || true
