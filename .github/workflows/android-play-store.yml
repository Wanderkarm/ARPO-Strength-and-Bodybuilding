name: Android Build & Play Store

# Run manually from GitHub Actions tab, or automatically on pushes to main
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: App

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node / JS deps ────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: App/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      # ── 2b. TypeScript type-check — fail fast before the Gradle build ────────
      - name: TypeScript check
        run: npx tsc --noEmit

      # ── 3. Java (required by Gradle / Android build tools) ───────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Generate native Android project ───────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          CI: "1"

      # ── 5. Decode keystore ───────────────────────────────────────────────────
      # Generate locally with:
      #   keytool -genkey -v -keystore release.keystore -alias powrlog \
      #     -keyalg RSA -keysize 2048 -validity 10000
      # Then base64-encode and store as ANDROID_KEYSTORE secret:
      #   base64 -i release.keystore | pbcopy
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        run: |
          # Use absolute path — Gradle resolves signing.store.file relative to the
          # module dir (android/app/) not the project root, so relative paths double up.
          KEYSTORE_PATH="$GITHUB_WORKSPACE/App/android/app/release.keystore"
          echo "$ANDROID_KEYSTORE" | base64 --decode > "$KEYSTORE_PATH"
          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      # ── 6. Build signed AAB ──────────────────────────────────────────────────
      - name: Build release AAB
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD" \
            2>&1 | tee /tmp/gradle.log
          grep -q "BUILD FAILED" /tmp/gradle.log && exit 1 || true

      # ── 7. Upload AAB to Play Store internal track ───────────────────────────
      # Requires a Google Play service account JSON key stored as secret.
      # Setup: Play Console → Setup → API access → Create service account
      # Grant the service account "Release manager" role on the app.
      # Download the JSON key and store the entire contents as GOOGLE_PLAY_SERVICE_ACCOUNT_JSON.
      - name: Upload to Play Store (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.powrlog.app
          releaseFiles: App/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      # ── 8. Show versionCode for the record ───────────────────────────────────
      - name: Print versionCode
        run: |
          VERSION_CODE=$(python3 -c "import json; d=json.load(open('app.json')); print(d['expo']['android']['versionCode'])")
          echo "Uploaded versionCode: $VERSION_CODE"
