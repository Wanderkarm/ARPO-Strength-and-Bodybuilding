name: iOS Build & TestFlight

# Run manually from GitHub Actions tab, or automatically on pushes to main
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node / JS deps ────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install JS dependencies
        run: npm ci

      # ── 3. Generate native iOS project ───────────────────────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean
        env:
          # Prevents expo from prompting for login during prebuild
          CI: "1"

      # ── 4. Ruby / CocoaPods ──────────────────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      # ── 5. Code signing ──────────────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          CERTIFICATE_P12: ${{ secrets.IOS_DIST_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain so the certificate is isolated to this run
          security create-keychain -p "ci_keychain_pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "ci_keychain_pass" build.keychain
          security set-keychain-settings -t 7200 -u build.keychain

          echo "$CERTIFICATE_P12" | base64 --decode -o /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "ci_keychain_pass" build.keychain
          rm /tmp/certificate.p12

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/powrlog_appstore.mobileprovision

      # ── 6. Xcode archive ─────────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -workspace ios/POWRLOG.xcworkspace \
            -scheme POWRLOG \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/POWRLOG.xcarchive" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="powrlog_appstore" \
            2>&1 | tail -50

      # ── 7. Export IPA ────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.powrlog.app</key>
              <string>powrlog_appstore</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/POWRLOG.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      # ── 8. Upload to TestFlight ───────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/POWRLOG.ipa" \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # ── 9. Cleanup keychain ───────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain || true
